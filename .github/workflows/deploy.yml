# Деплой на прод-сервер по пушу в master.
# Секреты: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
# Переменные: DEPLOY_ENABLED, DEPLOY_PATH, SSH_PORT

name: Deploy to production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT || '2222' }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ ! -s ~/.ssh/id_ed25519 ]; then
            echo "::error::SSH_PRIVATE_KEY is empty or not set"
            exit 1
          fi
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts || true

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT || '2222' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/deploy/h-sport' }}
        run: |
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" "cd $DEPLOY_PATH && bash scripts/server-deploy.sh"
