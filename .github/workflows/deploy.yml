# Деплой на прод-сервер по пушу в master.
# Секреты: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
# Переменные: DEPLOY_ENABLED = true, DEPLOY_PATH (по умолчанию /root/h-sport)

name: Deploy to production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -vvv -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo SSH_OK && whoami" 2>&1 || true

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ vars.DEPLOY_PATH || '/root/h-sport' }} && ./scripts/server-deploy.sh"
